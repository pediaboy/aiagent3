<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — {{ agent_name }}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:36px;width:360px}
h2{font-size:22px;font-weight:700;color:#25d366;margin-bottom:4px}
p{color:#666;font-size:13px;margin-bottom:24px}
label{font-size:12px;color:#aaa;display:block;margin-bottom:6px}
input{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:10px 12px;color:#e0e0e0;font-size:14px;outline:none;margin-bottom:16px}
input:focus{border-color:#25d366}
button{width:100%;background:#25d366;color:#000;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#1fb354}
.alert{padding:10px;background:#3d0d0d;border:1px solid #e74c3c;color:#e74c3c;border-radius:6px;font-size:13px;margin-bottom:14px}
</style>
</head>
<body>
<div class="card">
  <h2>🤖 {{ agent_name }}</h2>
  <p>Admin Dashboard — Login</p>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}<div class="alert">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" placeholder="Masukkan password" autofocus>
    <button type="submit">Masuk →</button>
  </form>
</div>
</body>
</html>
