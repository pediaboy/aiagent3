{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="card">
  <div class="card-title">Konfigurasi Agent</div>
  <p class="text-muted" style="margin-bottom:16px">Perubahan akan aktif setelah restart agent.</p>
  <form method="POST" action="/settings/save">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    {% for key, val in env_vars.items() %}
    <div class="form-group">
      <label class="form-label">{{ key }}</label>
      {% if 'KEY' in key or 'SECRET' in key or 'TOKEN' in key %}
      <input type="password" class="form-control" name="{{ key }}" value="{{ val }}">
      {% else %}
      <input class="form-control" name="{{ key }}" value="{{ val }}">
      {% endif %}
    </div>
    {% endfor %}
    </div>
    <button class="btn btn-primary" type="submit">💾 Simpan Settings</button>
  </form>
</div>
{% endblock %}
